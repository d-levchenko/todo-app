<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/todo-app/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO App</title>

    <link
      rel="stylesheet"
      href="node_modules/modern-normalize/modern-normalize.css" />

    <script type="module" crossorigin src="/todo-app/index.js"></script>
    <link rel="stylesheet" crossorigin href="/todo-app/assets/index-BBMUmQgQ.css">
  </head>
  <body>
    <header class="page-header">
  <h1 class="title">Todo</h1>
  <button class="theme-button">
    <img src="./assets/icon-sun.svg" alt="Sun icon" id="theme-icon" />
  </button>
</header>


    <main>
      <section class="creation-section">
  <div class="creation-wrapper">
    <label class="todo-label">
      <input
        class="todo-checkbox"
        type="checkbox"
        aria-hidden="true"
        tabindex="-1" />
      <span class="custom-checkbox" aria-hidden="true"></span>
    </label>

    <input class="todo-input" type="text" placeholder="Create a new todo..." />
  </div>
</section>

      <section class="todo-list-section">
  <div class="todo-wrapper">
    <ul class="todo-list"></ul>

    <div class="todo-footer">
      <p class="todo-counter-text">
        <span class="todo-counter">0</span>
        Items Left
      </p>
      <button class="todo-list-button">Clear Completed</button>
    </div>
  </div>
</section>

      <section class="section-filters">
  <div class="filters-wrapper">
    <ul class="filters-list">
      <li>
        <button class="filters-button active">All</button>
      </li>
      <li>
        <button class="filters-button">Active</button>
      </li>
      <li>
        <button class="filters-button">Completed</button>
      </li>
    </ul>
  </div>
</section>

    </main>

  </body>
</html>
